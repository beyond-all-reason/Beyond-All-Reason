name: Run Unit Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  busted:
    runs-on: ubuntu-latest
    # Run inside Fedora to match contributors' bar-dev distrobox env
    # (BAR-Devtools/docker/dev.Containerfile pins fedora:43 + lx via
    # cargo-binstall). Earlier ubuntu-latest + .deb-installed lx
    # tripped a path-resolution issue around the bundled lux-luaXX
    # interpreter shims that didn't reproduce in the cargo-binstall
    # tarball install we use locally.
    container:
      image: fedora:43

    steps:
    - uses: actions/checkout@v5

    - name: Install build deps + Lua 5.1
      run: |
        # Fedora 43's `lua` package is 5.4; the 5.1 interpreter ships
        # under the compat-lua* names (matches BAR-Devtools' dev image).
        dnf install -y --setopt=install_weak_deps=False \
          git gcc gcc-c++ make \
          compat-lua compat-lua-devel \
          gpgme

    - name: Install Lux via cargo-binstall
      run: |
        # GHA containers map $HOME to /github/home (not /root), so the
        # cargo-binstall self-install lands at $HOME/.cargo/bin -- can't
        # hardcode /root/.cargo/bin like the local Containerfile does.
        curl -L --proto '=https' --tlsv1.2 -sSf \
          https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh \
          | bash
        "$HOME/.cargo/bin/cargo-binstall" --no-confirm \
          --version 0.28.3 \
          --install-path /usr/local/bin \
          lux-cli
        ln -sf /usr/bin/lua-5.1 /usr/local/bin/lua

    - name: Cache Lux dependencies
      uses: actions/cache@v4
      with:
        path: .lux
        key: lux-5.1-fedora43-${{ hashFiles('lux.lock') }}
        restore-keys: |
          lux-5.1-fedora43-

    - name: Run busted
      run: lx --lua-version 5.1 test
