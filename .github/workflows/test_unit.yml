name: Run Unit Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  busted:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install Lua 5.1
      run: |
        sudo apt-get update
        sudo apt-get install -y lua5.1 liblua5.1-0-dev

    - name: Install Lux
      uses: lumen-oss/gh-actions-lux@v1
      with:
        version: 0.29.0

    - name: Cache Lux dependencies
      uses: actions/cache@v4
      with:
        path: .lux
        key: lux-5.1-${{ runner.os }}-${{ hashFiles('lux.lock') }}
        restore-keys: |
          lux-5.1-${{ runner.os }}-

    - name: Diagnose env
      run: |
        echo "--- lua / lx ---"
        which lua lua5.1 lua-5.1 2>&1 || true
        lua -v 2>&1 || true
        lua5.1 -v 2>&1 || true
        lx --version
        echo "--- lockfile dkjson ---"
        grep -A 5 '"name": "dkjson"' lux.lock | head -20
        echo "--- toml ---"
        cat lux.toml

    - name: Run busted (verbose)
      run: lx --verbose --lua-version 5.1 test
