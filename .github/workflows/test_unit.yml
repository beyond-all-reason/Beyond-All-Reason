name: Run Unit Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  busted:
    runs-on: ubuntu-latest
    # Run inside Fedora to match contributors' bar-dev distrobox env
    # (BAR-Devtools/docker/dev.Containerfile pins fedora:43 + lx via
    # cargo-binstall). Earlier ubuntu-latest + .deb-installed lx 0.29
    # tripped a path-resolution issue around the bundled lux-luaXX
    # interpreter shims that didn't reproduce in the cargo-binstall
    # tarball install we use locally.
    container:
      image: fedora:43

    steps:
    - uses: actions/checkout@v5

    - name: Install build deps + Lua 5.1
      run: |
        dnf install -y --setopt=install_weak_deps=False \
          git curl tar gcc gcc-c++ make \
          lua-5.1 lua-5.1-devel \
          gpgme

    - name: Install Lux via cargo-binstall
      run: |
        curl -L --proto '=https' --tlsv1.2 -sSf \
          https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh \
          | bash
        /root/.cargo/bin/cargo-binstall --no-confirm \
          --version 0.29.0 \
          --install-path /usr/local/bin \
          lux-cli
        ln -sf /usr/bin/lua-5.1 /usr/local/bin/lua

    - name: Cache Lux dependencies
      uses: actions/cache@v4
      with:
        path: .lux
        key: lux-5.1-fedora43-${{ hashFiles('lux.lock') }}
        restore-keys: |
          lux-5.1-fedora43-

    - name: Run busted
      run: lx --lua-version 5.1 test
