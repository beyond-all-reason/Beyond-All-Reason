name: Lint

# Deactivated for now -- enable pull_request trigger when ready
on:
  workflow_dispatch:
    pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v4

      - run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck .
